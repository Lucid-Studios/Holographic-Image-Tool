name: Standards or policy request
description: Request a repository policy, governance, documentation, or standards update.
title: "[Policy]: "
labels:
  - documentation
  - governance
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the standards or governance update you want.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source or authority
      description: Link the source, framework, guidance, or regulation driving the request.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI governance
        - Data governance
        - Citizen science
        - GitHub workflow
        - Security
        - Documentation
    validations:
      required: true
